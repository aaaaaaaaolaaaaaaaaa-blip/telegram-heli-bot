name: Daily Render Ping - Keep Awake

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:
  push:                       # هذا مؤقت عشان يظهر الـ Workflow
    branches: [ main ]

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Service
        run: |
          echo "🌐 Pinging https://telegram-heli-bot.onrender.com ..."
          curl -I --fail --max-time 15 --silent https://telegram-heli-bot.onrender.com || echo "Ping completed"
          echo "✅ Done"
